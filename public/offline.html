<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Life Dashboard</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top, #dbeafe 0%, #f8fafc 42%, #e2e8f0 100%);
        color: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      main {
        width: min(100%, 420px);
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 20px 50px rgba(15, 23, 42, 0.12);
        padding: 28px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        padding: 8px 12px;
        border-radius: 999px;
        background: #e0f2fe;
        color: #0369a1;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      h1 {
        margin: 16px 0 10px;
        font-size: 28px;
        line-height: 1.15;
      }

      p {
        margin: 0;
        color: #334155;
        line-height: 1.6;
      }

      button {
        margin-top: 22px;
        border: 0;
        border-radius: 999px;
        background: #0f172a;
        color: #f8fafc;
        font: inherit;
        font-weight: 600;
        padding: 12px 18px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">Offline</div>
      <h1>Connection is unavailable.</h1>
      <p>
        Life Dashboard can reopen cached screens offline, but this page has not
        been cached yet. Reconnect and try again.
      </p>
      <button type="button" onclick="window.location.reload()">Try again</button>
    </main>
  </body>
</html>
